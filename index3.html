<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 6px 0;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 16px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }

        #webcam-container canvas {
            display: block;
            border-radius: 16px;
        }

        #label-container {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .prediction-item {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .class-name {
            font-weight: 600;
            color: #334155;
        }

        .probability {
            font-family: monospace;
            background: #e2e8f0;
            color: #0f172a;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine</h1>
    <div class="subtitle">ระบบวิเคราะห์รูปภาพ (อัปเดตผลทุก 3 วินาที)</div>
    
    <button type="button" class="btn-start" onclick="init()">เปิดใช้งานกล้อง</button>
    
    <div id="webcam-container"></div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/ddgkRvH8I/";
    let model, webcam, labelContainer, maxPredictions;
    let predictTimer; 

    async function init() {
        // ซ่อนปุ่มเริ่มงานเมื่อกดแล้ว
        document.querySelector('.btn-start').style.display = 'none';
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้อง
        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();
        
        // รันลูปให้ภาพจากกล้องเคลื่อนไหวปกติ
        window.requestAnimationFrame(loopWebcam);

        // แสดงผลกล้องบนหน้าเว็บ
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        // เตรียมพื้นที่แสดงผลลัพธ์
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; 
        for (let i = 0; i < maxPredictions; i++) {
            const itemDiv = document.createElement("div");
            itemDiv.className = "prediction-item";
            itemDiv.innerHTML = `<span class="class-name">-</span><span class="probability">0.00</span>`;
            labelContainer.appendChild(itemDiv);
        }

        // ทำนายผลครั้งแรกทันที
        await predict();

        // ตั้งเวลาให้ฟังก์ชันพยากรณ์ทำงานทุกๆ 3 วินาที (3000ms)
        predictTimer = setInterval(async () => {
            await predict();
        }, 3000);
    }

    // ทำหน้าที่อัปเดตเฟรมภาพของกล้องให้เคลื่อนไหวลื่นไหล
    function loopWebcam() {
        webcam.update(); 
        window.requestAnimationFrame(loopWebcam);
    }

    // ฟังก์ชันส่งภาพไปพยากรณ์ผลลัพธ์
    async function predict() {
        if (!webcam) return;
        
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability.toFixed(2);
            
            const item = labelContainer.childNodes[i];
            item.querySelector('.class-name').innerText = className;
            item.querySelector('.probability').innerText = probability;
        }
    }
</script>

</body>
</html>
